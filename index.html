<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080809">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Boussole">
<meta name="description" content="Boussole — Agrégateur d'actualités personnalisé. Sport, Rap, Monde, Tech et bonnes nouvelles en un seul endroit.">
<title>Boussole</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,700;1,400&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Install Banner -->
<div id="install-banner">
  <div class="ib-row">
    <div class="ib-icon">&#x1F9ED;</div>
    <div>
      <div class="ib-title">Installer Boussole</div>
      <div class="ib-sub">Accès rapide depuis l'écran d'accueil</div>
    </div>
  </div>
  <div class="ib-hint" id="ib-hint">Sur iPhone : appuie sur Partager puis "Ajouter à l'écran d'accueil"</div>
  <div class="ib-btns">
    <button class="ib-inst" id="ib-inst">Installer</button>
    <button class="ib-dism" id="ib-dism">Plus tard</button>
  </div>
</div>

<!-- Reader Overlay -->
<div id="reader">
  <div class="rdr-progress" id="rdr-progress"></div>
  <div class="rdr-hdr">
    <button class="rdr-back" id="rdr-back" aria-label="Retour">&#8592;</button>
    <span class="rdr-src" id="rdr-src"></span>
    <div class="rdr-actions">
      <button class="rdr-action-btn" id="rdr-fav" aria-label="Sauvegarder">♡</button>
      <button class="rdr-action-btn" id="rdr-share" aria-label="Partager">↗</button>
      <a class="rdr-ext" id="rdr-ext" target="_blank" rel="noopener">Ouvrir &#x2197;</a>
    </div>
  </div>
  <div class="rdr-body">
    <h1 class="rdr-title" id="rdr-title"></h1>
    <span class="rdr-time" id="rdr-time"></span>
    <img class="rdr-hero" id="rdr-hero" alt="" style="display:none">
    <div class="rdr-desc" id="rdr-desc"></div>
    <a class="rdr-cta" id="rdr-cta" target="_blank" rel="noopener">Lire l'article complet sur le site source</a>
  </div>
</div>

<!-- Favorites Panel -->
<div id="favs-panel">
  <div class="rdr-hdr">
    <button class="rdr-back" id="favs-back" aria-label="Retour">&#8592;</button>
    <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:16px">🔖 Favoris</span>
  </div>
  <div class="rdr-body" id="favs-list"></div>
</div>

<!-- Header -->
<header>
  <div class="header-top">
    <div class="logo">&#x1F9ED; Boussole</div>
    <div class="header-actions">
      <button class="fav-btn" id="fav-btn" aria-label="Favoris">
        🔖
        <span class="fav-badge" id="fav-badge"></span>
      </button>
      <div class="lang-sw">
        <button class="lng on" data-l="fr">FR</button>
        <button class="lng" data-l="en">EN</button>
        <button class="lng" data-l="mix">Mix</button>
      </div>
    </div>
  </div>
  <div class="tabs-row" role="tablist">
    <button class="tb on" data-tab="sport" role="tab" aria-selected="true">Sport</button>
    <button class="tb" data-tab="rap" role="tab" aria-selected="false">Rap</button>
    <button class="tb" data-tab="monde" role="tab" aria-selected="false">Monde</button>
    <button class="tb" data-tab="good" role="tab" aria-selected="false">Good News</button>
    <button class="tb" data-tab="tech" role="tab" aria-selected="false">Tech</button>
  </div>
</header>

<!-- Main Content -->
<main>
  <div class="panel on" id="p-sport" role="tabpanel"></div>
  <div class="panel" id="p-rap" role="tabpanel"></div>
  <div class="panel" id="p-monde" role="tabpanel"></div>
  <div class="panel" id="p-good" role="tabpanel"></div>
  <div class="panel" id="p-tech" role="tabpanel"></div>
</main>

<script src="app.js"></script>
</body>
</html>
