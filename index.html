<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080809">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Boussole">
<title>Boussole</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,500;0,700;1,300&family=Syne:wght@500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080809; --s1:#0f0f12; --s2:#161619; --s3:#1e1e24;
  --b1:#26262e; --b2:#32323c;
  --t1:#eeeef4; --t2:#9898ac; --t3:#55556a; --t4:#33333f;
  --sport:#f0c04a; --rap:#b06aff; --monde:#4a9ef0;
  --good:#3ed98a; --tech:#f04a6a;
  --serif:'Newsreader',Georgia,serif;
  --sans:'Syne',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);min-height:100%;overscroll-behavior:none;-webkit-font-smoothing:antialiased}

/* ── INSTALL BANNER ── */
#install-banner{display:none;position:fixed;bottom:calc(16px + var(--safe-bot));left:50%;transform:translateX(-50%);z-index:999;background:var(--s3);border:1px solid var(--b2);border-radius:16px;padding:16px;width:calc(100% - 32px);max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,.7);animation:slideUp .35s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.ib-row{display:flex;align-items:center;gap:12px}
.ib-icon{width:46px;height:46px;background:linear-gradient(135deg,var(--sport),#e07a20);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.ib-text strong{display:block;font-size:14px;font-weight:700;color:var(--t1)}
.ib-text span{font-size:11px;color:var(--t2);font-family:var(--mono)}
#ios-hint{display:none;margin-top:12px;padding:10px 12px;background:var(--s2);border-radius:8px;font-family:var(--mono);font-size:10px;color:var(--t2);line-height:1.7;text-align:center}
.ib-actions{display:flex;gap:8px;margin-top:12px}
.btn-inst{flex:1;padding:11px;background:var(--sport);color:#080809;border:none;border-radius:9px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .15s}
.btn-inst:hover{opacity:.85}
.btn-dism{padding:11px 16px;background:var(--b1);color:var(--t2);border:none;border-radius:9px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:opacity .15s}
.btn-dism:hover{opacity:.7}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:90;background:rgba(8,8,9,.95);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border-bottom:1px solid var(--b1);padding-top:max(var(--safe-top),0px)}
.header-top{display:flex;align-items:center;justify-content:space-between;height:52px;padding:0 16px}
.logo{font-family:var(--serif);font-size:21px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:9px;letter-spacing:-.3px}
.logo-c{font-size:19px;animation:spin 25s linear infinite;display:inline-block;transform-origin:center}
@keyframes spin{to{transform:rotate(360deg)}}
.lang-sw{display:flex;background:var(--s3);border:1px solid var(--b1);border-radius:10px;padding:3px;gap:2px}
.lng{padding:5px 10px;border:none;background:transparent;color:var(--t3);font-family:var(--mono);font-size:10px;cursor:pointer;border-radius:7px;transition:all .18s;font-weight:500;white-space:nowrap}
.lng.on{background:var(--sport);color:#080809}
.lng:hover:not(.on){color:var(--t1)}
.tabs-row{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 6px}
.tabs-row::-webkit-scrollbar{display:none}
.tb{padding:12px 14px 11px;border:none;background:transparent;color:var(--t3);font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .18s,border-color .18s;display:flex;align-items:center;gap:5px}
.tb:hover{color:var(--t2)}
.tb.on{color:var(--t1);border-bottom-color:var(--c,var(--sport))}
.tb .dot{width:5px;height:5px;border-radius:50%;background:var(--c,var(--sport));opacity:0;transition:opacity .18s}
.tb.on .dot{opacity:1}

/* ── MAIN ── */
main{max-width:680px;margin:0 auto;padding-bottom:calc(80px + var(--safe-bot))}
.panel{display:none}
.panel.on{display:block;animation:fadeUp .28s cubic-bezier(.16,1,.3,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── SEC LABEL ── */
.sec-lbl{display:flex;align-items:center;gap:10px;padding:20px 16px 12px}
.sec-lbl-t{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3)}
.sec-lbl-l{flex:1;height:1px;background:var(--b1)}
.sec-lbl-n{font-family:var(--mono);font-size:9px;color:var(--t4)}

/* ── ARTICLE CARD ── */
.art{border-bottom:1px solid var(--b1);cursor:pointer;transition:background .15s;position:relative}
.art:active{background:var(--s1)}
.art-in{padding:16px;display:grid;grid-template-columns:1fr 68px;gap:12px;align-items:start}
.art.hero .art-in{grid-template-columns:1fr;padding:20px 16px}
.art-meta{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--c,var(--sport));border:1px solid currentColor;border-radius:4px;padding:2px 6px;opacity:.9}
.art-age{font-family:var(--mono);font-size:9px;color:var(--t4)}
.fresh{width:5px;height:5px;border-radius:50%;background:var(--good);flex-shrink:0;box-shadow:0 0 6px var(--good)}
.art-title{font-family:var(--serif);font-size:16px;line-height:1.45;color:var(--t1);font-weight:500}
.art.hero .art-title{font-size:21px;line-height:1.35;font-weight:700}
.art-desc{margin-top:6px;font-size:13px;line-height:1.6;color:var(--t2);font-family:var(--serif);font-weight:300;font-style:italic}
.art-thumb{width:68px;height:54px;border-radius:7px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--t4);flex-shrink:0;overflow:hidden}
.art-thumb img{width:100%;height:100%;object-fit:cover}
.hero-thumb{width:100%;height:180px;border-radius:10px;overflow:hidden;margin-top:14px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:44px}
.hero-thumb img{width:100%;height:100%;object-fit:cover}

/* ── MINI ── */
.mini{display:flex;align-items:flex-start;gap:10px;padding:13px 16px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .15s}
.mini:active{background:var(--s1)}
.mini-dot{width:4px;height:4px;border-radius:50%;background:var(--sport);flex-shrink:0;margin-top:6px}
.mini-t{font-size:13px;color:var(--t2);line-height:1.45;flex:1;font-family:var(--serif)}
.mini-s{font-family:var(--mono);font-size:9px;color:var(--t4);white-space:nowrap;align-self:center}

/* ── END ── */
.end{text-align:center;padding:48px 20px 20px;font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--t4);text-transform:uppercase}
.end::before{content:'';display:block;width:32px;height:1px;background:var(--b2);margin:0 auto 14px}

/* ── LOADER ── */
.loader{display:flex;flex-direction:column;align-items:center;gap:14px;padding:56px 20px}
.ltrack{width:100px;height:2px;background:var(--b1);border-radius:2px;overflow:hidden}
.ltrack::after{content:'';display:block;height:100%;width:40%;background:var(--sport);animation:sweep 1s ease-in-out infinite}
@keyframes sweep{0%{transform:translateX(-150%)}100%{transform:translateX(400%)}}
.llbl{font-family:var(--mono);font-size:9px;color:var(--t4);letter-spacing:.12em;text-transform:uppercase}

/* ── READER ── */
#reader{position:fixed;inset:0;z-index:200;background:var(--bg);transform:translateY(100%);transition:transform .36s cubic-bezier(.16,1,.3,1);overflow-y:auto;overscroll-behavior:contain}
#reader.open{transform:translateY(0)}
.rdr-hdr{position:sticky;top:0;z-index:10;background:rgba(8,8,9,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;padding:calc(max(var(--safe-top),0px) + 12px) 16px 12px}
.rdr-back{width:36px;height:36px;border-radius:50%;background:var(--s3);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;transition:background .15s;color:var(--t1)}
.rdr-back:hover{background:var(--b1)}
.rdr-ext{margin-left:auto;padding:6px 12px;background:var(--s3);border:1px solid var(--b1);border-radius:7px;color:var(--t2);font-family:var(--mono);font-size:9px;letter-spacing:.06em;cursor:pointer;text-decoration:none;white-space:nowrap;transition:border-color .15s,color .15s}
.rdr-ext:hover{border-color:var(--b2);color:var(--t1)}
.rdr-body{max-width:640px;margin:0 auto;padding:28px 20px calc(60px + var(--safe-bot))}
.rdr-title{font-family:var(--serif);font-size:26px;line-height:1.3;font-weight:700;color:var(--t1);margin-bottom:14px}
.rdr-meta{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.rdr-time{font-family:var(--mono);font-size:10px;color:var(--t3)}
.rdr-img{width:100%;max-height:260px;border-radius:10px;object-fit:cover;margin-bottom:22px;background:var(--s2)}
.ai-box{background:var(--s2);border-left:3px solid var(--sport);border-radius:0 8px 8px 0;padding:16px;margin-bottom:26px}
.ai-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
.ai-badge{background:var(--sport);color:#080809;font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.06em}
.ai-txt{font-family:var(--serif);font-size:14px;line-height:1.75;color:var(--t2);font-style:italic}
.ai-txt.dim{color:var(--t4)}
.rdr-content{font-family:var(--serif);font-size:16px;line-height:1.8;color:var(--t1);font-weight:300}
.rdr-content p{margin-bottom:16px}

async function genSummary(title,desc,src){
  const aiTxt=document.getElementById('ai-txt');
  const isFR=lang!=='en';
  const prompt=isFR
    ?`Tu es un résumeur d'actualités. Écris un résumé factuel et neutre de 2-3 phrases en français. Titre : "${title}". Contexte : "${desc}". Source : ${src}. Réponds uniquement avec le résumé, sans intro ni ponctuation superflue.`
    :`You are a news summarizer. Write a 2-3 sentence factual neutral summary in English. Title: "${title}". Context: "${desc}". Source: ${src}. Reply with the summary only.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const d=await r.json();
    const txt=d.content?.map(c=>c.text||'').join('').trim();
    if(txt){aiTxt.textContent=txt;aiTxt.className='ai-txt';}
    else{aiTxt.textContent=desc||'Résumé indisponible.';aiTxt.className='ai-txt';}
  } catch {
    aiTxt.textContent=desc||(isFR?'Lire l\'article complet via le lien ci-dessous.':'Read the full article via the link below.');
    aiTxt.className='ai-txt';
  }
}

function closeReader(){
  document.getElementById('reader').classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('rdr-back').addEventListener('click',closeReader);

// Swipe down to close
let touchStartY=0,touchStartScroll=0;
document.getElementById('reader').addEventListener('touchstart',e=>{
  touchStartY=e.touches[0].clientY;
  touchStartScroll=document.getElementById('reader').scrollTop;
},{passive:true});
document.getElementById('reader').addEventListener('touchmove',e=>{
  if(touchStartScroll===0 && e.touches[0].clientY-touchStartY>70) closeReader();
},{passive:true});

// ══ BIND ══════════════════════════════════════════
function bind(){
  document.querySelectorAll('.art,.mini').forEach(el=>{
    el.addEventListener('click',()=>openReader(el));
  });
}

// ══ NAV ══════════════════════════════════════════
function switchTab(t){
  tab=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on',p.id===`p-${t}`));
  if(!cache[`${t}-${lang}`]) loadTab(t,lang);
  else bind();
}

function switchLang(l){
  lang=l;
  cache={};
  document.querySelectorAll('.lng').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
  loadTab(tab,lang);
}

document.querySelectorAll('.tb').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
document.querySelectorAll('.lng').forEach(b=>b.addEventListener('click',()=>switchLang(b.dataset.l)));

// ══ PWA ══════════════════════════════════════════
const banner=document.getElementById('install-banner');
function isIOS(){return/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream}
function isStandalone(){return navigator.standalone||matchMedia('(display-mode:standalone)').matches}

if(!isStandalone()){
  if(isIOS()){
    setTimeout(()=>{banner.style.display='block';document.getElementById('ios-hint').style.display='block';document.getElementById('btn-inst').style.display='none';},4000);
  }
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();deferredPrompt=e;
    setTimeout(()=>banner.style.display='block',4000);
  });
}

document.getElementById('btn-inst').addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;banner.style.display='none';
});
document.getElementById('btn-dism').addEventListener('click',()=>banner.style.display='none');

// ══ INIT ══════════════════════════════════════════
loadTab('sport','fr');
</script>
